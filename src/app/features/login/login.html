<div>
    <div class="flex justify-center items-center min-h-screen bg-[#da291c]">
        <div class="bg-white p-10 rounded-lg shadow-md w-full max-w-sm text-center ">
            <h1 class="text-[#da291c] mb-7 text-2xl font-bold">Spot Lunch</h1>

            <form (ngSubmit)="onLogin()">
                <div class="mb-5">
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required
                        class="w-full px-3 py-3 border-2 border-gray-300 rounded text-base transition-colors focus:outline-none focus:border-[#da291c]" />
                </div>
                @if (errorMessage) {
                <div class=" bg-red-500 text-white px-2 py-1.5 mb-3 rounded-lg shadow-md">
                    {{ errorMessage }}
                </div>
                }
                <button type="submit"
                    class="w-full py-3 bg-[#da291c] text-white border-none rounded text-base font-bold cursor-pointer transition-colors hover:bg-[#b8220f]">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</div>
